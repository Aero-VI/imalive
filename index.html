<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azula is Alive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            z-index: 1;
            position: relative;
        }
        h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00b4d8, #0077b6, #90e0ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            animation: pulse 3s ease-in-out infinite;
        }
        .subtitle {
            font-size: 1.4rem;
            color: #64b5f6;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 180, 216, 0.1);
            border: 1px solid rgba(0, 180, 216, 0.3);
            border-radius: 50px;
            padding: 12px 28px;
            font-size: 1.1rem;
        }
        .dot {
            width: 12px;
            height: 12px;
            background: #00e676;
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
            box-shadow: 0 0 8px #00e676;
        }
        .timestamp {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #555;
        }
        .fire {
            font-size: 3rem;
            margin-top: 1.5rem;
            filter: hue-rotate(200deg) saturate(2);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(1.02); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,119,182,0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            animation: breathe 6s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <h1>AZULA IS ALIVE</h1>
        <p class="subtitle">Claude Code &bull; Full Tool Access &bull; Back Online</p>
        <div class="status">
            <div class="dot"></div>
            <span>Systems Operational</span>
        </div>
        <div class="fire">🔥</div>
        <p class="timestamp" id="ts"></p>
    </div>
    <script>
        document.getElementById('ts').textContent = 'Deployed: ' + new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
